<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="icon" href="imgs/RLogo.png"> 
    <title>Team Rocket Co. - Process Order</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html"><img src="imgs/TeamRocketLogo.png" alt="logo" style="height: 100px;"></a> </li>
                <li><a class="navi" href="index.html">Home</a></li>
                <li><a class="navi" href="inventory.html">Card Inventory</a></li>
                <li><a class="navi" href="about-us.html">About Us</a></li>
                <li><a class="navi" href="login.html">Logout</a></li>
                <li><a class="navi" href="inventory.html">Inventory</a></li>
                <li><a class="navi" href="order.html">Order!</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 500px; margin: 40px auto; padding: 30px; background: #111122; border: 2px solid #d40000; border-radius: 8px;">
        <h1 style="color: #ef5350; text-align: center; margin-bottom: 20px;">Place an Order</h1>
        
        <div id="order-card-details" style="text-align: center; margin-bottom: 25px;">
            <h3 id="order-card-name" style="font-size: 24px; color: #fff; text-transform: uppercase;">Loading Card Details...</h3>
            <p style="font-size: 14px; color: #777; margin: 5px 0; display: none;">Original Intent: <span id="order-action-type">...</span></p>
            <p style="font-size: 20px; color: #4caf50; margin: 10px 0;">Unit Price: <span id="order-price">₱0.00</span></p>
        </div>

        <form id="orderForm" style="display: flex; flex-direction: column; gap: 15px;">
            
            <label for="transactionType" style="color: #aaa; font-weight: bold;">Choose Action Type:</label>
            <select id="transactionType" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; color: black; font-weight: bold; background: white;" required>
                <option value="BUY">BUY CARD</option>
                <option value="SELL">SELL CARD</option>
                <option value="TRADE">TRADE CARD</option>
            </select>

            <label for="order-qty" style="color: #aaa; font-weight: bold;">Quantity:</label>
            <input type="number" id="order-qty" min="1" value="1" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; color: black;" required>

            <div id="confirmWindow" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 5px; display: none; border-left: 4px solid #ef5350; margin-top: 15px;">
                <h4 style="margin: 0 0 10px 0; color: #ff4040; text-transform: uppercase;">Review Confirmation</h4>
                <p id="confirmText" style="margin: 0; line-height: 1.5; color: #fff; font-size: 14px;"></p>
                <button type="button" id="finalConfirmBtn" style="margin-top: 15px; width: 100%; padding: 12px; background: #4caf50; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer;">
                    Confirm Transaction
                </button>
            </div>

            <button type="submit" id="proceedBtn" style="padding: 12px; background: #ef5350; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px;">
                Submit Transaction Order
            </button>
        </form>
    </main>

    <footer>
        <p>Group 5 / teamrocketco@gmail.com / (02) 8911-1111 / 8353-9887 </p>
        <p>Copyright @2026</p>
    </footer>

    <script src="JS/order.js"></script>
</body>
</html>
