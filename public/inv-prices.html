        <script>
            async function displayCards() {
                try{
                const response = await fetch('https://teamrocketco.onrender.com/inventoryprices');
                const cards = await response.json();

                const shopContainer = document.getElementById('cards');
                shopContainer.innerHTML = '';

                cards.forEach(card => {
                    const cardHTML = `
                        <div class="card-item">
                            <table>
                                <tr>
                                    <th>Cards</th>
                                    <th>Normal</th>
                                    <th>Reverse Holo</th>
                                    <th>Holo</th>
                                    <th>WPromo</th>
                                    <th>First Edition</th>
                                    <th>Condition</th>
                                    <th>Total Stock</th>
                                </tr>
                                <tr>
                                    <td> ${card.poke_name} </td>
                                    <td> ${card.final_price} </td>
                                </tr>
                            </table>
                            <p><strong>Condition:</strong> ${card.condition_id}</p>
                            <p><strong>Variant:</strong> ${card.variant_id}</p>
                            <p class="price">$${Number(card.final_price).toFixed(2)}</p>
                        </div>`
                    ;
                    // 5. Append this card layout right into our container div
                    shopContainer.innerHTML += cardHTML;
                });

            } catch (error) {
                document.getElementById('cards').innerHTML = `Error: ${error.message} <br> Stack: ${error.stack}`;
                console.error(error);
            }

        }
        displayCards()
        </script>

</button>

<button id="openModalBtn" style="background-color: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">
  + Add New Card
</button>

<div id="cardModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0,7); backdrop-filter: blur(4px); align-items: center; justify-content: center;">
  
  <div style="background-color: #1a1924; padding: 30px; border-radius: 8px; width: 400px; border: 1px solid #333; position: relative;">
    
    <span id="closeModalBtn" style="position: absolute; right: 20px; top: 15px; color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
    
    <h3 style="color: #ef5350; margin-top: 0; margin-bottom: 20px;">Add New Pokémon Card</h3>
    
    <form id="addCardForm" style="display: flex; flex-direction: column; gap: 15px;">
      <div>
        <label style="display: block; font-size: 13px; color: #ccc; margin-bottom: 5px;">Pokémon ID (poke_id)</label>
        <input type="number" id="pokeId" required style="width: 100%; padding: 10px; background: #12121c; color: white; border: 1px solid #333; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: #ccc; margin-bottom: 5px;">Condition ID</label>
        <input type="text" id="conditionId" placeholder="e.g., NM" required style="width: 100%; padding: 10px; background: #12121c; color: white; border: 1px solid #333; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: #ccc; margin-bottom: 5px;">Variant ID</label>
        <input type="text" id="variantId" placeholder="e.g., Holo" required style="width: 100%; padding: 10px; background: #12121c; color: white; border: 1px solid #333; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: #ccc; margin-bottom: 5px;">Stock Quantity</label>
        <input type="number" id="stockQty" value="1" required style="width: 100%; padding: 10px; background: #12121c; color: white; border: 1px solid #333; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: #ccc; margin-bottom: 5px;">Final Price ($)</label>
        <input type="number" step="0.01" id="finalPrice" placeholder="0.00" required style="width: 100%; padding: 10px; background: #12121c; color: white; border: 1px solid #333; border-radius: 4px; box-sizing: border-box;">
      </div>

      <button type="submit" style="background-color: #4caf50; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px;">
        Save Card to Database
      </button>
      <button onclick="deleteCard(${card.id})" style="background-color: #ef5350; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">
  Delete Card
</button>
