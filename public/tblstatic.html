        <script>
            async function displayLocation() {
                try {
                    const response = await fetch('https://teamrocketco.onrender.com/location');
                    const locs = await response.json();

                    const shopContainer = document.getElementById('locations');
                    let htmlContent =`
                                <div class="card-item" style="border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 6px;">
                                    <table>
                                        <tr>
                                            <th>Area Code</th>
                                            <th>City</th>
                                            <th>Action</th>
                                        </tr>
                                        `
                        locs.forEach(loc => {
                            htmlContent += `
                                        <tr>
                                            <td> ${loc.area_code} </td>
                                            <td> ${loc.city} </td>
                                            <td><button onclick="deleteCard(${loc.area_code})" style="background-color: #ef5350; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-top: 10px;">
                                            Delete Card
                                            </button> </td>
                                        </tr>
                                        `;
                            });
                            htmlContent += `
                                        </table>
                                    </div>
                                `;
                            shopContainer.innerHTML = htmlContent;
                } catch (error) {
                    document.getElementById('locations').innerHTML = `Error: ${error.message} <br> Stack: ${error.stack}`;
                    console.error(error);
                }
            }
            async function displayElements(){
                try{
                    const response = await fetch('https://teamrocketco.onrender.com/elements');
                    const elems = await response.json();

                    const shopContainer = document.getElementById('locations');
                    let htmlContent =`
                                <div class="card-item" style="border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 6px;">
                                    <table>
                                        <tr>
                                            <th>Element ID</th>
                                            <th>Elements</th>
                                            <th>Action</th>
                                        </tr>
                                        `
                        elems.forEach(elem => {
                            htmlContent += `
                                        <tr>
                                            <td> ${elem.element_id} </td>
                                            <td> ${elem.elements} </td>
                                            <td><button onclick="deleteCard(${elem.element_id})" style="background-color: #ef5350; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-top: 10px;">
                                            Delete
                                            </button> </td>
                                        </tr>
                                        `;
                            });
                            htmlContent += `
                                        </table>
                                    </div>
                                `;
                            shopContainer.innerHTML = htmlContent;
                } catch {
                    document.getElementById('locations').innerHTML = `Error: ${error.message} <br> Stack: ${error.stack}`;
                    console.error(error);
                }
            }
            async function displayConditions(){
                try{
                    const response = await fetch('https://teamrocketco.onrender.com/conditions');
                    const cond = await response.json();

                    const shopContainer = document.getElementById('locations');
                    let htmlContent =`
                                <div class="card-item" style="border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 6px;">
                                    <table>
                                        <tr>
                                            <th>Condition ID</th>
                                            <th>Conditions</th>
                                            <th>Condition Discount</th>
                                            <th>Action</th>
                                        </tr>
                                        `
                        cond.forEach(con => {
                            htmlContent += `
                                        <tr>
                                            <td> ${con.condition_id} </td>
                                            <td> ${con.conditions} </td>
                                            <td> ${con.condition_discount} </td>
                                            <td><button onclick="deleteCard(${con.condition_id})" style="background-color: #ef5350; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-top: 10px;">
                                            Delete

                                        </tr>
                                        `;
                            });
                            htmlContent += `
                                        </table>
                                    </div>
                                `;
                            shopContainer.innerHTML = htmlContent;
                } catch {
                    document.getElementById('locations').innerHTML = `Error: ${error.message} <br> Stack: ${error.stack}`;
                    console.error(error);
                }
            }
            async function displayVariations(){
                try{
                    const response = await fetch('https://teamrocketco.onrender.com/variants');
                    const vars = await response.json();

                    const shopContainer = document.getElementById('locations');
                    let htmlContent =`
                                <div class="card-item" style="border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 6px;">
                                    <table>
                                        <tr>
                                            <th>Variant ID</th>
                                            <th>Variants</th>
                                            <th>Variant Price Multiplier
                                            <th>Action</th>
                                        </tr>
                                        `
                        vars.forEach(varis => {
                            htmlContent += `
                                        <tr>
                                            <td> ${varis.variant_id} </td>
                                            <td> ${varis.variants} </td>
                                            <td> ${varis.variant_multiplier} </td>
                                            <td><button onclick="deleteCard(${varis.variant_id})" style="background-color: #ef5350; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-top: 10px;">

                            htmlContent += `
                                        </table>
                                    </div>
                                `;
                            shopContainer.innerHTML = htmlContent;
                } catch {
                    document.getElementById('locations').innerHTML = `Error: ${error.message} <br> Stack: ${error.stack}`;
                    console.error(error);
