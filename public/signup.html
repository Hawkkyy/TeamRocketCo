         <main>
            <img src="imgs/TeamRocketLogo.png" alt="Team Rocket" style="width:40%;height: 40%;">
            <h2> Sign Up! </h2>
            <div class="login">
                <form name="signUpForm" action="https://teamrocketco.onrender.com/register" onsubmit="return validateForm()" method="POST">

                    Username: <input type="text" name="user" maxlength="50" required> <br>
  
                    First Name: <input type="text" name="fname" pattern="[A-Za-z ]+" title="Letters only." maxlength="50" required> <br>
                    Last Name: <input type="text" name="lname" pattern="[A-Za-z ]+" title="Letters only." maxlength="50" required>  <br>
  
                    Contact No.: <input type="text" name="cont" pattern="[0-9]+" title="Numbers only." maxlength="20" required><br>
  
                    Area Code: <select name="area" required>
                                    <option value="" disabled selected>Select an area code:</option>
                                    <option value="11">11 (Sapporro)</option>
                                    <option value="3">3 (Tokyo)</option>
                                    <option value="52">52 (Nagoya)</option>
                                    <option value="6">6 (Osaka)</option>
                                    <option value="75">75 (Kyoto)</option>
                                    <option value="78">78 (Kobe)</option>
                                    <option value="82">82 (Hiroshima)</option>
                                    <option value="92">92 (Fukuoka)</option>
                                    <option value="95">95 (Yokohama)</option>
                                </select> <br>
  
                    Password: <input type="password" name="pass"  maxlength="15" required>   <br>
  
                                <input type="submit" value="Submit">
                                
                    <input class="sw" type="button" onclick="window.location.href='login.html'" value="Have an account? Log-in!">
                </form> <br>
